[env]
USER_FULLNAME = "Steve Beulac"
USER_EMAIL = "steve@beaulac.me"

[settings]
experimental = true
dotfiles.root = "~/.dotfiles"
dotfiles.default_mode = "symlink"

[dotfiles]
"~/.config/mise/config.toml" = "config/mise/config.toml"
"~/.agents/AGENTS.md" = "config/agents/AGENTS.md"
"~/.pi/agents/AGENTS.md" = "config/agents/AGENTS.md"
"~/.config/nvim/" = { source = "config/nvim", mode = "symlink-each" } 
"~/.config/opencode" = { source = "config/opencode", mode = "symlink-each" }
# "~/.config/fish/conf.d/mise.fish" = { block = '/usr/bin/mise activate fish | source' }
"~/.config/fish/config.fish" = "config/fish/config.fish"
"~/.config/git/config" = "config/git/config"
"~/.config/git/local" = { source = "templates/git.tmpl", template = "tera" }

[bootstrap.mise_shell_activate]       # mise activation in shell startup files
zprofile = "shims"
zshrc = "activate"
fish = "activate"

[tools]
fish-shell = "latest"
age = "latest"
bun = "latest"
"cargo:cargo-llvm-cov" = "latest"
codex = "latest"
copilot-cli = "latest"
"github:ZinoKader/portal" = "latest"
"github:danielmiessler/fabric" = "latest"
"github:mrusme/reader" = "latest"
"github:ulyssa/iamb" = "latest"
herdr = "latest"
neovim = "latest"
node = "latest"
"npm:@earendil-works/pi-coding-agent" = "latest"
"npm:mermaid-cli" = "latest"
"npm:pi-acp" = "latest"
opencode = "latest"
pi = "latest"
tree-sitter = "latest"
worktrunk = "latest"
